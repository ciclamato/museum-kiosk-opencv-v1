<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Video — Museo Kiosk Lite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a10;
            --bg2: #12121c;
            --bg3: #1a1a28;
            --accent: #00ffd0;
            --accent2: #7850ff;
            --danger: #ff4444;
            --text: #eeeef4;
            --muted: #888899;
            --r: 10px;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--bg2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-accent { background: var(--accent); color: var(--bg); }
        .btn-accent:hover { opacity: 0.85; }
        .btn-ghost { background: rgba(255,255,255,0.06); color: var(--muted); }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }

        .form-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 32px 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea { min-height: 70px; resize: vertical; }

        .form-group .hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .checkbox-group label {
            margin-bottom: 0;
            text-transform: none;
            font-size: 14px;
            color: var(--text);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 28px;
        }

        .file-info {
            font-size: 13px;
            color: var(--muted);
            background: var(--bg3);
            padding: 8px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>✏️ Editar Video</h1>
        <a href="{{ url_for('index') }}" class="btn btn-ghost">← Volver</a>
    </header>

    <div class="form-container">
        <div class="file-info">
            📁 {{ item.file }}
        </div>

        <form action="{{ url_for('edit_content', content_id=item.id) }}" method="post">
            <div class="form-group">
                <label>Título</label>
                <input type="text" name="title" value="{{ item.title }}" required>
            </div>

            <div class="form-group">
                <label>Texto Overlay (se muestra al detectar la mano)</label>
                <textarea name="overlay_text" placeholder="Texto que aparece sobre el video">{{ item.overlay_text or '' }}</textarea>
                <div class="hint">Este texto aparecerá centrado sobre el video cuando se detecte una mano. Usa \n para saltos de línea.</div>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" name="enabled" id="enabled" {{ 'checked' if item.enabled }}>
                    <label for="enabled">Habilitado en playlist</label>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-accent">Guardar Cambios</button>
                <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
